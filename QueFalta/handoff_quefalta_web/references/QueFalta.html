<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QueFalta · La lista de la compra compartida</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Archivo:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Mulish:wght@400;500;600;700;800&family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #fbf6ee;
    --paper-2: #f6efe3;
    --ink: #2b2521;
    --ink-soft: #8a7f73;
    --ink-faint: #c2b8a9;
    --accent: #df4b2e;
    --accent-soft: #fbe7df;
    --surface: #ffffff;
    --border: #ece2d3;
    --geo: 'Space Grotesk', system-ui, sans-serif;
    --serif: 'Newsreader', Georgia, serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--geo); -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #fff; }

  /* Scroll progress */
  .qf-progress {
    position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 100;
    background: var(--accent); transform-origin: 0 50%; transform: scaleX(0);
  }

  /* Nav */
  .qf-nav { position: sticky; top: 0; z-index: 60; background: rgba(251,246,238,0.82); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .qf-nav-inner { max-width: 1180px; margin: 0 auto; padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; }
  .qf-word { font-family: var(--geo); font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: var(--ink); }
  .qf-word span { color: var(--accent); }
  .qf-nav-right { display: flex; align-items: center; gap: 26px; }
  .qf-nav-link { font-size: 14px; font-weight: 600; color: var(--ink-soft); }
  .qf-nav-link:hover { color: var(--ink); }
  .qf-nav-cta { font-size: 13.5px; font-weight: 700; color: #fff; background: var(--ink); padding: 9px 18px; border-radius: 999px; }
  .qf-nav-cta:hover { background: var(--accent); }

  /* Hero */
  .qf-hero { max-width: 1180px; margin: 0 auto; padding: 70px 40px 40px; }
  .qf-hero-grid { display: grid; grid-template-columns: 1fr 360px; gap: 60px; align-items: center; }
  .qf-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); background: var(--surface); border: 1px solid var(--border); padding: 7px 14px; border-radius: 999px; }
  .qf-dot { width: 7px; height: 7px; border-radius: 50%; background: #3f8f4f; box-shadow: 0 0 0 3px rgba(63,143,79,0.18); }
  .qf-hero-title { font-family: var(--geo); font-weight: 700; font-size: clamp(40px, 5.6vw, 68px); line-height: 0.98; letter-spacing: -0.03em; margin: 22px 0 0; }
  .qf-hero-title em { font-family: var(--serif); font-style: italic; font-weight: 500; color: var(--accent); letter-spacing: -0.01em; }
  .qf-hero-desc { font-size: 17px; line-height: 1.6; color: var(--ink-soft); max-width: 460px; margin: 22px 0 0; }
  .qf-hero-actions { display: flex; align-items: center; gap: 18px; margin-top: 30px; flex-wrap: wrap; }
  .qf-hero-meta { font-size: 13px; font-weight: 600; color: var(--ink-faint); }

  /* Apple badge */
  .qf-badge { display: inline-flex; align-items: center; gap: 11px; background: var(--ink); color: #fff; padding: 11px 18px 11px 16px; border-radius: 14px; transition: transform .15s, background .15s; }
  .qf-badge:hover { background: #000; transform: translateY(-1px); }
  .qf-badge-txt { display: flex; flex-direction: column; line-height: 1.05; text-align: left; }
  .qf-badge-txt small { font-size: 10px; font-weight: 500; opacity: 0.85; letter-spacing: 0.02em; }
  .qf-badge-txt strong { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }

  /* Hero phone */
  .qf-hero-phone { position: relative; display: flex; align-items: center; justify-content: center; }
  .qf-glow { position: absolute; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(223,75,46,0.22), rgba(223,75,46,0) 68%); filter: blur(8px); }
  .qf-phone-tilt { position: relative; transform: rotate(-3deg); }

  /* Scroll cue */
  .qf-scrollcue { display: flex; flex-direction: column; align-items: center; gap: 6px; margin: 56px auto 0; width: max-content; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }
  .qf-scrollcue svg { animation: qf-bob 1.8s ease-in-out infinite; }
  @keyframes qf-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

  /* Showcase */
  .qf-showcase { max-width: 1180px; margin: 0 auto; padding: 40px 40px 0; }
  .qf-showcase-grid { display: grid; grid-template-columns: 1fr 380px; gap: 70px; align-items: start; }
  .qf-feature { min-height: 86vh; display: flex; flex-direction: column; justify-content: center; max-width: 480px; opacity: 0.4; transition: opacity .4s ease; }
  .qf-feature.is-active { opacity: 1; }
  .qf-feature-eyebrow { display: flex; align-items: center; gap: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent); }
  .qf-num { font-family: var(--serif); font-style: italic; font-size: 16px; font-weight: 500; color: var(--ink-faint); letter-spacing: 0; }
  .qf-feature-title { font-family: var(--geo); font-weight: 700; font-size: clamp(28px, 3.4vw, 40px); line-height: 1.04; letter-spacing: -0.025em; margin: 16px 0 0; }
  .qf-feature-desc { font-size: 16.5px; line-height: 1.6; color: var(--ink-soft); margin: 18px 0 0; }
  .qf-bullets { list-style: none; padding: 0; margin: 26px 0 0; display: flex; flex-direction: column; gap: 14px; }
  .qf-bullets li { display: flex; align-items: flex-start; gap: 12px; font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.4; }
  .qf-check { flex: 0 0 auto; width: 22px; height: 22px; border-radius: 7px; background: var(--accent); display: flex; align-items: center; justify-content: center; margin-top: 1px; }

  /* Sticky phone */
  .qf-phone-col { height: 100%; }
  .qf-phone-sticky { position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  .qf-phone-frame { position: relative; }
  .qf-phone-frame::before { content: ''; position: absolute; inset: -40px; background: radial-gradient(circle, rgba(223,75,46,0.14), rgba(223,75,46,0) 70%); z-index: -1; }
  .qf-screen-fade { animation: qf-fade .5s ease; }
  @keyframes qf-fade { from { opacity: 0; transform: translateY(10px) scale(0.99); } to { opacity: 1; transform: none; } }
  .qf-phone-label { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 8px 8px 8px 18px; box-shadow: 0 6px 20px rgba(80,60,40,0.08); }
  .qf-label-name { font-size: 14px; font-weight: 700; color: var(--ink); }
  .qf-label-count { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-soft); padding: 5px 11px; border-radius: 999px; font-variant-numeric: tabular-nums; }

  /* CTA */
  .qf-cta { margin-top: 40px; background: var(--ink); color: #fff; }
  .qf-cta-inner { max-width: 1180px; margin: 0 auto; padding: 100px 40px 40px; text-align: center; }
  .qf-cta .qf-word { color: #fff; }
  .qf-word-lg { font-size: 30px; }
  .qf-cta-title { font-family: var(--serif); font-style: italic; font-weight: 500; font-size: clamp(36px, 5vw, 58px); line-height: 1.0; letter-spacing: -0.02em; margin: 18px 0 0; }
  .qf-cta-desc { font-size: 17px; color: rgba(255,255,255,0.7); max-width: 440px; margin: 20px auto 0; line-height: 1.55; }
  .qf-cta-actions { display: flex; justify-content: center; margin-top: 30px; }
  .qf-cta .qf-badge { background: #fff; color: var(--ink); }
  .qf-cta .qf-badge:hover { background: var(--paper); }
  .qf-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 80px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.12); font-size: 13px; color: rgba(255,255,255,0.55); }
  .qf-foot-links { display: flex; gap: 22px; }
  .qf-foot-links a:hover { color: #fff; }

  /* Responsive */
  @media (max-width: 900px) {
    .qf-nav-inner, .qf-hero, .qf-showcase, .qf-cta-inner { padding-left: 22px; padding-right: 22px; }
    .qf-hero-grid { grid-template-columns: 1fr; gap: 30px; }
    .qf-hero-phone { order: -1; }
    .qf-phone-tilt { transform: none; }
    .qf-showcase-grid { grid-template-columns: 1fr; gap: 0; }
    .qf-phone-col { order: -1; position: sticky; top: 0; z-index: 20; }
    .qf-phone-sticky { height: auto; padding: 12px 0 10px; gap: 10px; transform: scale(0.82); transform-origin: top center; background: linear-gradient(var(--paper) 70%, rgba(251,246,238,0)); }
    .qf-feature { min-height: 64vh; max-width: none; }
    .qf-nav-link { display: none; }
  }
</style>
</head>
